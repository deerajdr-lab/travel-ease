<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TravelEase | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { padding: 50px; max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #6e8efb; color: white; }
        .status-badge { background: #d4edda; color: #155724; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Admin Dashboard</h1>
        <p>Manage your hotel bookings and site content.</p>
        
        <h3>Recent Bookings</h3>
        <table>
            <thead>
                <tr>
                    <th>Customer Email</th>
                    <th>Hotel Name</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>john@example.com</td>
                    <td>Hotel Ritz, Paris</td>
                    <td>2026-06-12</td>
                    <td><span class="status-badge">Confirmed</span></td>
                </tr>
                <tr>
                    <td>rahul@mail.in</td>
                    <td>The Taj Palace, Delhi</td>
                    <td>2026-07-05</td>
                    <td><span class="status-badge">Confirmed</span></td>
                </tr>
            </tbody>
        </table>
        <br>
        <button onclick="location.href='index.html'" style="background-color:#777;">Logout</button>
    </div>
    <!-- Replace your old logout button with this -->
<button onclick="adminLogout()" style="background-color:#777;">Logout</button>

<script>
    function adminLogout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
